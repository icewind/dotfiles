# General settings
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

## Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g default-terminal "screen-256color"

set -sg escape-time 10

set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Key bindings
unbind-key -n Escape

## Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

## More convenient prefix key
unbind C-b
set -g prefix C-a
bind C-a send-prefix

## Shift Alt vim keys to switch windows
bind -n C-S-Left previous-window
bind -n C-S-Right next-window

## Vi mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Plugins 
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'

# Status Bar (kanso mist theme)
set -g status-bg "#22262D"
set -g status-fg "#C5C9C7"

set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#22262D fg=#C5C9C7'
set -g status-left ''
set -g status-right '#[fg=#2a2c35,bg=#22262D]#[fg=#C5C9C7,bg=#2a2c35] %d/%m #[fg=#8a9a7b,bg=#2a2c35]#[fg=#22262D,bg=#8a9a7b] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=#22262D bg=#8a9a7b bold'
setw -g window-status-current-format ' #I#[fg=#393B44]:#[fg=#22262D]#W#[fg=#5C6066]#F #[fg=#8a9a7b,bg=#22262D]'

setw -g window-status-style 'fg=#C5C9C7 bg=#393B44'
setw -g window-status-format ' #I#[fg=#C5C9C7]:#[fg=#C5C9C7]#W#[fg=#C5C9C7]#F '
